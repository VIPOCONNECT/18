<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#121212">
    <meta name="description" content="נגן מוזיקה מותאם לשימוש ברכב עם מצבי יום/לילה וניהול פלייליסטים">
    <title>נגן מוזיקה לרכב</title>
    
    <!-- PWA קישורים -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="images/icon-192x192.png">
    
    <!-- סגנונות -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap">
</head>
<body class="dark-theme">
    <!-- כפתור החלפת ערכת נושא -->
    <button id="themeToggleBtn" class="theme-toggle" aria-label="עבור למצב יום">
        <i class="fas fa-sun"></i>
    </button>

    <!-- כפתור התקנת PWA -->
    <button id="installBtn" class="install-btn">התקן את האפליקציה <i class="fas fa-download"></i></button>

    <div class="container">
        <!-- כותרת האפליקציה -->
        <div class="header">
            <h1 class="app-title">נגן מוזיקה לרכב</h1>
        </div>
        
        <div class="music-player">
        
        <!-- מיכל נגן הוידאו -->
        <div id="player" class="video-frame"></div>
        
        <!-- תצוגת שיר נוכחי -->
        <div class="current-song-container">
            <div class="current-song-label">שיר נוכחי:</div>
            <div id="currentSong" class="current-song">טוען...</div>
        </div>
        
        <!-- כפתורי שליטה מורחבים -->
        <div class="control-buttons">
            <button id="prevBtn" class="control-btn" aria-label="שיר קודם"><i class="fas fa-step-backward"></i></button>
            <button id="playBtn" class="control-btn" aria-label="הפעל"><i class="fas fa-play"></i></button>
            <button id="pauseBtn" class="control-btn" aria-label="השהה"><i class="fas fa-pause"></i></button>
            <button id="nextBtn" class="control-btn" aria-label="שיר הבא"><i class="fas fa-step-forward"></i></button>
            <button id="shuffleBtn" class="control-btn" aria-label="ערבוב"><i class="fas fa-random"></i></button>
        </div>
        
        <!-- בקר עוצמת שמע -->
        <div class="volume-control">
            <button id="muteBtn" class="volume-icon" aria-label="השתק"><i class="fas fa-volume-up"></i></button>
            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="100">
        </div>
        
        <!-- תצוגת מידע על הפלייליסט -->
        <div class="playlist-info">
            <h2 id="playlistName" class="playlist-name">🎵 שירים ישראלים 🇮🇱</h2>
            <p id="playlistDescription" class="playlist-description">מגוון שירים ישראלים פופולריים</p>
            
            <!-- מידע על השיר הנוכחי -->
            <div class="current-track-info">
                <h3 id="trackTitle" class="track-title">טוען שיר...</h3>
                <div id="progressContainer" class="progress-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
                <div class="track-time">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>
            
            <!-- ניווט בין פלייליסטים -->
            <div class="playlist-navigation">
                <button id="prevPlaylistBtn" class="nav-btn">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div id="playlistInfo">טוען פלייליסט...</div>
                <button id="nextPlaylistBtn" class="nav-btn">
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>
            
            <!-- ניהול פלייליסטים -->
            <div class="playlist-management">
                <button id="addPlaylistBtn" class="add-playlist-btn">
                    <i class="fas fa-plus-circle"></i> הוסף פלייליסט מותאם אישית
                </button>
            </div>
        </div>
        
        <!-- הודעת טעינה / שגיאה -->
        <div id="status-message" class="status-message">טוען נגן...</div>
    </div>

    <!-- טעינת YouTube API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    
    <!-- סקריפטים של האפליקציה -->
    <script src="js/playlists.js"></script>
    <script src="js/player.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/pwa.js"></script>
    <script src="js/app.js"></script>
    <!-- דיאלוג להוספת פלייליסט -->
    <div id="playlistModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3>הוסף פלייליסט חדש</h3>
            <form id="addPlaylistForm">
                <div class="form-group">
                    <label for="playlistName">שם הפלייליסט:</label>
                    <input type="text" id="playlistName" required placeholder="לדוגמה: השירים האהובים שלי">
                </div>
                <div class="form-group">
                    <label for="playlistId">מזהה הפלייליסט ביוטיוב:</label>
                    <input type="text" id="playlistId" required placeholder="לדוגמה: PLxxxxxxxxxxxxxxx">
                    <small>* העתק את מזהה הפלייליסט מה-URL של יוטיוב</small>
                </div>
                <div class="form-group">
                    <label for="playlistDescription">תיאור קצר:</label>
                    <textarea id="playlistDescription" placeholder="תיאור קצר של הפלייליסט"></textarea>
                </div>
                <button type="submit" class="submit-btn">הוסף פלייליסט</button>
            </form>
        </div>
    </div>
</body>
</html>
